<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi perfil | Gacha Infinita</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 1rem;
            line-height: 1.6;
            background: #faf9f7;
            color: #2c2b28;
            transition: all 0.3s ease;
        }
        [data-theme="dark"] body {
            background: #1a1a1a;
            color: #e5e5e5;
        }
        
        .options-bar {
            position: sticky;
            top: 0;
            background: #faf9f7;
            border-bottom: 1px solid #e5e0d8;
            padding: 0.6rem 1rem;
            display: flex;
            justify-content: flex-end;
            gap: 0.8rem;
            z-index: 100;
            flex-wrap: wrap;
        }
        [data-theme="dark"] .options-bar {
            background: #1a1a1a;
            border-bottom-color: #404040;
        }
        .options-bar button, .options-bar a {
            background: #eef2f0;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            color: #1a4d5f;
            text-decoration: none;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 1rem;
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            color: #1a4d5f;
            text-align: center;
        }
        
        /* Formularios */
        .auth-section, .profile-section {
            background: white;
            border: 1px solid #e5e0d8;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        [data-theme="dark"] .auth-section, [data-theme="dark"] .profile-section {
            background: #2d2d2d;
            border-color: #404040;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.3rem;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid #e5e0d8;
            border-radius: 8px;
            background: #faf9f7;
            font-family: inherit;
        }
        [data-theme="dark"] .form-group input {
            background: #1a1a1a;
            border-color: #404040;
            color: #e5e5e5;
        }
        
        button {
            background: #1a4d5f;
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        [data-theme="dark"] button {
            background: #5a9e8c;
        }
        
        .error-message {
            color: #e53e3e;
            font-size: 0.8rem;
            margin-top: 0.3rem;
        }
        .success-message {
            color: #38a169;
            font-size: 0.8rem;
            margin-top: 0.3rem;
        }
        
        /* Perfil */
        .profile-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .level-badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            font-weight: bold;
            margin-top: 0.5rem;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .stat-card {
            text-align: center;
            padding: 1rem;
            background: #eef2f0;
            border-radius: 12px;
        }
        [data-theme="dark"] .stat-card {
            background: #2a3a35;
        }
        .stat-number {
            font-size: 1.5rem;
            font-weight: bold;
            color: #1a4d5f;
        }
        [data-theme="dark"] .stat-number {
            color: #5a9e8c;
        }
        
        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        .leaderboard-table th, .leaderboard-table td {
            padding: 0.5rem;
            text-align: left;
            border-bottom: 1px solid #e5e0d8;
        }
        
        @media (max-width: 600px) {
            .container { padding: 0.5rem; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
</head>
<body>
    <div class="options-bar">
        <div class="font-size-control">
            <button id="fontMinus">A-</button>
            <button id="fontPlus">A+</button>
        </div>
        <a href="index.html">📚 Índice</a>
        <button id="themeToggle">🌙 Modo oscuro</button>
    </div>

    <div class="container">
        <h1>📖 Mi perfil - Gacha Infinita</h1>
        
        <!-- Sección de autenticación (solo visible si no hay sesión) -->
        <div id="authSection" class="auth-section">
            <h2>🔐 Iniciar sesión / Registrarse</h2>
            <div id="loginForm">
                <div class="form-group">
                    <label>Correo electrónico</label>
                    <input type="email" id="loginEmail" placeholder="tucorreo@ejemplo.com">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="loginPassword" placeholder="********">
                </div>
                <button id="loginBtn">Iniciar sesión</button>
                <p style="margin-top: 1rem; text-align: center;">¿No tienes cuenta? <a href="#" id="showRegisterLink">Regístrate</a></p>
                <div id="loginMessage"></div>
            </div>
            
            <div id="registerForm" style="display: none;">
                <div class="form-group">
                    <label>Nombre de usuario</label>
                    <input type="text" id="regUsername" placeholder="Como quieres que te llamen">
                </div>
                <div class="form-group">
                    <label>Correo electrónico</label>
                    <input type="email" id="regEmail" placeholder="tucorreo@ejemplo.com">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres">
                </div>
                <div class="form-group">
                    <label>Confirmar contraseña</label>
                    <input type="password" id="regConfirmPassword" placeholder="********">
                </div>
                <button id="registerBtn">Registrarse</button>
                <p style="margin-top: 1rem; text-align: center;"><a href="#" id="showLoginLink">← Volver al inicio de sesión</a></p>
                <div id="registerMessage"></div>
            </div>
        </div>
        
        <!-- Sección de perfil (solo visible con sesión) -->
        <div id="profileSection" style="display: none;">
            <div class="profile-header">
                <h2 id="profileUsername">Usuario</h2>
                <div id="profileLevelBadge" class="level-badge">🥚 Recluta</div>
                <p id="profilePoints">0 puntos</p>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="statChapters">0</div>
                    <div>Capítulos leídos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="statRatings">0</div>
                    <div>Calificaciones</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="statComments">0</div>
                    <div>Comentarios</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="statLikes">0</div>
                    <div>Likes recibidos</div>
                </div>
            </div>
            
            <button id="logoutBtn" style="width: 100%; margin-top: 1rem;">Cerrar sesión</button>
        </div>
        
        <!-- Tabla de clasificación -->
        <div class="auth-section">
            <h2>🏆 Clasificación de lectores</h2>
            <div id="leaderboardContainer">
                <p>Cargando...</p>
            </div>
        </div>
    </div>

    <script>
        // ========== CONTROLES DE TEMA Y TAMAÑO ==========
        function initControls() {
            const savedTheme = localStorage.getItem('gacha_theme');
            if (savedTheme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
            const savedFont = localStorage.getItem('gacha_fontsize');
            if (savedFont) document.body.style.fontSize = savedFont + '%';
            
            document.getElementById('fontPlus').onclick = () => {
                let size = parseInt(localStorage.getItem('gacha_fontsize')) || 100;
                size = Math.min(150, size + 10);
                document.body.style.fontSize = size + '%';
                localStorage.setItem('gacha_fontsize', size);
            };
            document.getElementById('fontMinus').onclick = () => {
                let size = parseInt(localStorage.getItem('gacha_fontsize')) || 100;
                size = Math.max(70, size - 10);
                document.body.style.fontSize = size + '%';
                localStorage.setItem('gacha_fontsize', size);
            };
            
            const themeBtn = document.getElementById('themeToggle');
            if (document.documentElement.hasAttribute('data-theme')) themeBtn.textContent = '☀️ Modo claro';
            themeBtn.onclick = () => {
                const isDark = document.documentElement.hasAttribute('data-theme');
                if (isDark) {
                    document.documentElement.removeAttribute('data-theme');
                    localStorage.setItem('gacha_theme', 'light');
                    themeBtn.textContent = '🌙 Modo oscuro';
                } else {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    localStorage.setItem('gacha_theme', 'dark');
                    themeBtn.textContent = '☀️ Modo claro';
                }
            };
        }
        
        // ========== ACTUALIZAR PERFIL ==========
        async function updateProfileDisplay() {
            const result = await getUserProfile();
            if (!result.success) return;
            
            const profile = result.profile;
            document.getElementById('profileUsername').textContent = profile.username;
            document.getElementById('profilePoints').textContent = `${profile.totalPoints} puntos`;
            document.getElementById('profileLevelBadge').textContent = `${profile.levelBadge} (Nivel ${profile.level})`;
            document.getElementById('profileLevelBadge').style.backgroundColor = profile.levelColor;
            document.getElementById('statChapters').textContent = profile.stats?.chaptersRead || 0;
            document.getElementById('statRatings').textContent = profile.stats?.ratingsGiven || 0;
            document.getElementById('statComments').textContent = profile.stats?.commentsWritten || 0;
            document.getElementById('statLikes').textContent = profile.stats?.likesReceived || 0;
        }
        
        // ========== CARGAR TABLA DE CLASIFICACIÓN ==========
        async function loadLeaderboard() {
            const container = document.getElementById('leaderboardContainer');
            const result = await getLeaderboard(20);
            
            if (!result.success) {
                container.innerHTML = '<p>Error al cargar la clasificación.</p>';
                return;
            }
            
            if (result.leaders.length === 0) {
                container.innerHTML = '<p>No hay usuarios registrados aún.</p>';
                return;
            }
            
            let html = '<table class="leaderboard-table"><thead><tr><th>#</th><th>Usuario</th><th>Nivel</th><th>Puntos</th><th>Capítulos</th></tr></thead><tbody>';
            result.leaders.forEach((user, index) => {
                html += `<tr>
                            <td>${index + 1}</td>
                            <td>${escapeHtml(user.username)}</td>
                            <td><span style="background:${user.levelColor}; padding:2px 8px; border-radius:20px;">${user.levelBadge}</span></td>
                            <td>${user.totalPoints}</td>
                            <td>${user.stats?.chaptersRead || 0}</td>
                         </tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
        }
        
        // ========== MANEJAR AUTENTICACIÓN ==========
        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
        }
        
        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        }
        
        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const messageDiv = document.getElementById('loginMessage');
            
            if (!email || !password) {
                messageDiv.innerHTML = '<span class="error-message">Completa todos los campos</span>';
                return;
            }
            
            const result = await loginUser(email, password);
            if (result.success) {
                messageDiv.innerHTML = '<span class="success-message">Inicio de sesión exitoso</span>';
                setTimeout(() => location.reload(), 1000);
            } else {
                messageDiv.innerHTML = `<span class="error-message">${result.error}</span>`;
            }
        }
        
        async function handleRegister() {
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            const messageDiv = document.getElementById('registerMessage');
            
            if (!username || !email || !password) {
                messageDiv.innerHTML = '<span class="error-message">Completa todos los campos</span>';
                return;
            }
            
            if (password !== confirm) {
                messageDiv.innerHTML = '<span class="error-message">Las contraseñas no coinciden</span>';
                return;
            }
            
            if (password.length < 6) {
                messageDiv.innerHTML = '<span class="error-message">La contraseña debe tener al menos 6 caracteres</span>';
                return;
            }
            
            const result = await registerUser(email, password, username);
            if (result.success) {
                messageDiv.innerHTML = '<span class="success-message">Registro exitoso. Iniciando sesión...</span>';
                setTimeout(() => location.reload(), 1500);
            } else {
                messageDiv.innerHTML = `<span class="error-message">${result.error}</span>`;
            }
        }
        
        async function handleLogout() {
            await logoutUser();
            location.reload();
        }
        
        // ========== INICIALIZACIÓN ==========
        document.addEventListener('DOMContentLoaded', () => {
            initControls();
            
            // Verificar estado de autenticación
            onAuthStateChanged(async (state) => {
                if (state.loggedIn) {
                    document.getElementById('authSection').style.display = 'none';
                    document.getElementById('profileSection').style.display = 'block';
                    await updateProfileDisplay();
                    await loadLeaderboard();
                } else {
                    document.getElementById('authSection').style.display = 'block';
                    document.getElementById('profileSection').style.display = 'none';
                    await loadLeaderboard();
                }
            });
            
            // Eventos de autenticación
            document.getElementById('loginBtn').onclick = handleLogin;
            document.getElementById('registerBtn').onclick = handleRegister;
            document.getElementById('logoutBtn').onclick = handleLogout;
            document.getElementById('showRegisterLink').onclick = (e) => { e.preventDefault(); showRegister(); };
            document.getElementById('showLoginLink').onclick = (e) => { e.preventDefault(); showLogin(); };
        });
    </script>
</body>
</html>
